name: iOS CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pod install

      - name: Build Application
        run: |
          xcodebuild \
          -workspace MyApp.xcworkspace \
          -scheme MyApp \
          -sdk iphonesimulator \
          build

      - name: Run Tests
        run: |
          xcodebuild test \
          -workspace MyApp.xcworkspace \
          -scheme MyApp \
          -destination 'platform=iOS Simulator,name=iPhone 15'
